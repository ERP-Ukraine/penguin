version: '3.2'

volumes:

  pg13penguin17:
    driver: local

  odoo17penguin-container-data:
    driver: local

  odoo17penguin-data:
    driver: local

  vscode-data:
    driver: local

services:

  db-penguin17:
    image: postgres:13.5
    environment:
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_USER=odoo
    volumes:
      - pg13penguin17:/var/lib/postgresql/data

  web-penguin17:
    links:
      - db-penguin17
    tty: true
    image: erpukraine/odoo-ee-erpu:17.0-latest
    depends_on:
      - db-penguin17
    environment:
      - HOST=db-penguin17
    ports:
      - "8069:8069"
    volumes:
      - ./:/mnt/extra-addons:cached
      - odoo17penguin-container-data:/home/vscode/.local/share/Odoo
      - odoo17penguin-data:/var/lib/odoo
      - ./odoo.conf:/etc/odoo/odoo.conf
      - vscode-data:/home/vscode/.vscode-server
