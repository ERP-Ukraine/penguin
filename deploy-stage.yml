- hosts: all
  remote_user: bohdan
  become: false

  tasks:
    - name: Change image tag
      command: sed -i "s/17.0-.*$/17.0-{{ BITBUCKET_BUILD_NUMBER }}/" docker-compose.yml
      args:
        chdir: /opt/odoo15staging

    - name: Pull image
      command: docker-compose pull
      args:
        chdir: /opt/odoo15staging

    - name: Stop container
      command: docker-compose down
      args:
        chdir: /opt/odoo15staging

    - name: Start container
      command: docker-compose up -d
      args:
        chdir: /opt/odoo15staging
